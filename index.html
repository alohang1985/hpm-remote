<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HPM 리모컨</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 🔒 비밀번호 잠금 화면 -->
  <div id="lock-screen">
    <div class="lock-box">
      <div style="font-size:48px;margin-bottom:12px">🔒</div>
      <h2 style="margin-bottom:4px;font-size:18px;">HPM 리모컨</h2>
      <p style="color:#999;font-size:12px;margin-bottom:20px;">비밀번호를 입력하세요</p>
      <input type="password" id="lock-input" placeholder="비밀번호" inputmode="numeric" maxlength="10"
        style="width:100%;padding:12px;border-radius:8px;border:1px solid #404040;background:#1a1a1a;color:#ececec;font-size:18px;text-align:center;letter-spacing:8px;">
      <button id="lock-btn" class="btn btn-primary" style="margin-top:12px;">접속</button>
      <p id="lock-msg" style="color:#ef4444;font-size:12px;margin-top:8px;min-height:16px;"></p>
    </div>
  </div>

  <!-- 메인 앱 (잠금 해제 후 표시) -->
  <div id="main-app" style="display:none;">

  <!-- 연결 상태 -->
  <header id="header">
    <h1>🏨 HPM 리모컨</h1>
    <span id="pc-status" class="status offline">🔴 PC 오프라인</span>
  </header>

  <!-- 호텔 선택 -->
  <section class="card">
    <label>호텔 선택</label>
    <select id="hotel-select">
      <option value="">호텔 목록 로딩중...</option>
    </select>
  </section>

  <!-- 날짜 선택 -->
  <section class="card">
    <div class="row">
      <div class="field">
        <label>체크인</label>
        <input type="date" id="checkin">
      </div>
      <div class="field">
        <label>체크아웃 (자동)</label>
        <input type="date" id="checkout" style="opacity:0.6;">
      </div>
    </div>
    <div class="nights-row" style="display:flex;gap:4px;margin-top:8px;">
      <button class="btn-night active" data-nights="1">1박</button>
      <button class="btn-night" data-nights="2">2박</button>
      <button class="btn-night" data-nights="3">3박</button>
      <button class="btn-night" data-nights="4">4박</button>
      <button class="btn-night" data-nights="5">5박</button>
    </div>
  </section>

  <!-- 액션 버튼 -->
  <section class="card actions">
    <button id="btn-crawl" class="btn btn-primary">🔍 크롤링</button>
    <button id="btn-latest" class="btn btn-secondary">📊 현황 조회</button>
    <button id="btn-sync" class="btn btn-ghost">🔄 호텔 동기화</button>
  </section>

  <!-- 상태 메시지 -->
  <section id="status-area" class="card" style="display:none;">
    <div id="status-msg" class="status-msg"></div>
  </section>

  <!-- 결과 영역 -->
  <section id="result-area" style="display:none;">
    <div class="card">
      <h2 id="result-title">결과</h2>
      <div id="result-content"></div>
    </div>
  </section>

  <footer>
    <small>HPM Remote v1.0 · Firebase RTDB</small>
  </footer>

  </div><!-- /main-app -->

  <script type="module" src="app.js"></script>
</body>
</html>
